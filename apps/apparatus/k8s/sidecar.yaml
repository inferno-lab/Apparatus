apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-with-sidecar
  namespace: demo-targets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      # The Real Application (e.g., Apparatus acting as backend)
      - name: app
        image: ts-apparatus:latest
        ports:
        - containerPort: 8080
      
      # The Toxic Sidecar
      - name: toxic-sidecar
        image: ts-apparatus:latest
        command: ["npm", "run", "sidecar"]
        env:
        - name: SIDECAR_PORT
          value: "8081"
        - name: TARGET_URL
          value: "http://localhost:8080" # Points to the app in the same pod
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app-toxic
  namespace: demo-targets
spec:
  selector:
    app: sample-app
  ports:
  - port: 80
    targetPort: 8081 # Route traffic to the sidecar, not the app directly!
    protocol: TCP
