apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-apparatus
  namespace: echo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ts-apparatus
  template:
    metadata:
      labels:
        app: ts-apparatus
    spec:
      containers:
        - name: app
          image: ts-apparatus:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 8443
          envFrom:
            - configMapRef:
                name: ts-apparatus-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
