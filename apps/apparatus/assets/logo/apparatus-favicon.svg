    <polyline points="124,104 124,124 104,124"/>
    <polyline points="24,124 4,124 4,104"/>
  </g>
  <!-- A shape - heavier -->
  <g stroke="#00e5c6" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" fill="none">
