      - code [ref=e288]: "# Build Docker image docker build -t apparatus:latest ./apps/apparatus # Run container docker run -p 8090:8090 -p 8443:8443 -p 50051:50051 apparatus:latest # Access dashboard at http://localhost:8090/dashboard"
      - separator [ref=e289]
      - heading "Usage Examples" [level=2] [ref=e290]
      - heading "1. Test Your Web App with the Red Team AI" [level=3] [ref=e291]
      - code [ref=e293]: "# Start autopilot against your app curl -X POST http://localhost:8090/api/redteam/autopilot/start \\ -H \"Content-Type: application/json\" \\ -d '{ \"target\": \"http://myapp.local\", \"config\": { \"interval\": 2000, \"maxIterations\": 20, \"allowedTools\": [\"chaos.cpu\", \"cluster.attack\", \"mtd.rotate\"] } }' # Check status curl http://localhost:8090/api/redteam/autopilot/status # Get results curl http://localhost:8090/api/redteam/autopilot/reports"
      - heading "2. Validate Payload Detection" [level=3] [ref=e294]
      - code [ref=e296]: "# Test if your app blocks XSS/SQLi/command injection curl \"http://localhost:8090/redteam/validate?target=http://myapp&path=/search&method=GET\""
      - heading "3. Run a Chaos Scenario" [level=3] [ref=e297]
      - code [ref=e299]: "# Create a multi-step attack scenario curl -X POST http://localhost:8090/scenarios \\ -H \"Content-Type: application/json\" \\ -d '{ \"name\": \"distributed-attack\", \"steps\": [ { \"id\": \"1\", \"action\": \"chaos.cpu\", \"params\": { \"duration\": 5000 } }, { \"id\": \"2\", \"action\": \"delay\", \"params\": { \"duration\": 2000 } }, { \"id\": \"3\", \"action\": \"cluster.attack\", \"params\": { \"target\": \"http://127.0.0.1:8090/echo\", \"rate\": 100 } } ] }' # Get scenario ID from response, then run it curl -X POST http://localhost:8090/scenarios/{scenario_id}/run # Monitor execution curl http://localhost:8090/scenarios/{scenario_id}/status?executionId={execution_id}"
      - heading "4. Activate Defense Mechanisms" [level=3] [ref=e300]
      - code [ref=e302]: "# Add WAF rule to block admin panel access curl -X POST http://localhost:8090/sentinel/rules \\ -H \"Content-Type: application/json\" \\ -d '{ \"pattern\": \"/admin\", \"action\": \"block\" }' # Enable tarpit for suspicious IPs # Automatically traps access to /.env, /.git, /wp-admin, /admin.php # Activate Moving Target Defense curl -X POST http://localhost:8090/mtd -d '{\"prefix\": \"xyz123\"}' # Now all APIs require xyz123 prefix: /xyz123/echo, /xyz123/healthz, etc."
      - heading "5. Monitor Real-Time Traffic" [level=3] [ref=e303]
      - code [ref=e305]: "# Open web dashboard open http://localhost:8090/dashboard # Or use terminal UI pnpm tui # Or connect SSE client for raw events curl http://localhost:8090/sse"
      - heading "6. Capture and Replay Traffic" [level=3] [ref=e306]
      - code [ref=e308]: "# Capture network traffic for 30 seconds curl \"http://localhost:8090/capture.pcap?duration=30&iface=eth0\" -o traffic.pcap # Replay HAR (HTTP Archive) file curl -X POST http://localhost:8090/replay \\ -H \"Content-Type: application/json\" \\ -d @requests.har"
      - separator [ref=e309]
