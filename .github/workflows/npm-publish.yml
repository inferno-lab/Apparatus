name: Publish npm packages

on:
  push:
    tags:
      - 'apparatus-v*'
      - 'apparatus-client-v*'
      - 'apparatus-cli-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        options:
          - apparatus
          - apparatus-client
          - apparatus-cli
          - all
        default: apparatus
      dry_run:
        description: 'Dry run (validate without publishing)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish-apparatus:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/apparatus-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'apparatus' || inputs.package == 'all'))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'npm' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm nx run apparatus:build

      - name: Test
        run: pnpm nx run apparatus:test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/apparatus-v')
        working-directory: apps/apparatus
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/apparatus-v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: apps/apparatus
        run: pnpm publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: apps/apparatus
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-apparatus-client:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/apparatus-client-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'apparatus-client' || inputs.package == 'all'))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'npm' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm nx run client:build

      - name: Test
        run: pnpm nx run client:test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/apparatus-client-v')
        working-directory: libs/client
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/apparatus-client-v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: libs/client
        run: pnpm publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: libs/client
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-apparatus-cli:
    runs-on: ubuntu-latest
    needs: publish-apparatus-client
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/apparatus-cli-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'apparatus-cli' || inputs.package == 'all')))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'npm' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client (dependency)
        run: pnpm nx run client:build

      - name: Build CLI
        run: pnpm nx run cli:build

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/apparatus-cli-v')
        working-directory: apps/cli
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/apparatus-cli-v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: apps/cli
        run: pnpm publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: apps/cli
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
