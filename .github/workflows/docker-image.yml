name: Build Docker Image

on:
  pull_request:
    paths:
      - .github/workflows/docker-image.yml
      - apps/apparatus/**
      - libs/client/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - nx.json
      - tsconfig.base.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-image.yml
      - apps/apparatus/**
      - libs/client/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - nx.json
      - tsconfig.base.json
    tags:
      - 'apparatus-v*'
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/apparatus-v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/apparatus-v')
        run: echo "version=${GITHUB_REF#refs/tags/apparatus-v}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/apparatus
            ${{ startsWith(github.ref, 'refs/tags/apparatus-v') && 'atlascrew/apparatus' || '' }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/apparatus-v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/apparatus-v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/apparatus-v') }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/apparatus/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
